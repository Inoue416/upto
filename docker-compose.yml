services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: upto
      POSTGRES_PASSWORD: upto
      POSTGRES_USER: upto
    healthcheck:
      interval: 10s
      retries: 5
      test: ["CMD-SHELL", "pg_isready -U upto -d upto"]
      timeout: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  collector:
    build:
      context: .
      dockerfile: apps/collector/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    profiles:
      - batch

volumes:
  postgres-data:
